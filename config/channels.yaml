# ================================================================
# YouTube канали для моніторингу — YouTube Agent #2b
#
# channel_id:          знайти на сторінці каналу → About → Share channel
#                      або з URL: youtube.com/channel/UCxxxxxxxx
# name:                зручна назва для Telegram повідомлень
# max_videos_per_run:  скільки нових відео обробляти за один запуск (3 за замовч.)
# focus:               тематичний фокус для Claude summary (опційно)
#                      якщо не вказано — загальний AI/автоматизація фокус
# ================================================================

youtube_channels:
  - channel_id: "UCSHZKyawb77ixDdsGog4iWA"   # Lex Fridman Podcast — тест
    name: "Lex Fridman"
    max_videos_per_run: 1
    focus: "AI, технології, наука — нові ідеї та інсайти для бізнесу та розвитку"

