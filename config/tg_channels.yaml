# ================================================================
# Telegram канали для моніторингу — Agent #2d
#
# username:    @username каналу або посилання t.me/username
# name:        зручна назва для позначки у повідомленні
# keywords:    список ключових слів для фільтрації (порожньо = всі повідомлення)
# min_length:  мінімальна довжина повідомлення (символів), коротші ігноруються
# summarize:   true = довгі повідомлення (>500 символів) скорочує Claude
# ================================================================

